<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выдачи</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
  <div class="nav-brand">Учёт инструментов</div>
  <div class="nav-links">
    <a href="/">Главная</a>
    <a href="/instruments">Инструменты</a>
    <a href="/employees">Сотрудники</a>
    <a href="/issues" class="active">Выдачи</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Выдачи инструментов</h1>
    <button class="btn btn-primary" onclick="openModal()">+ Оформить выдачу</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th><th>Инструмент</th><th>Сотрудник</th>
        <th>Выдан</th><th>Вернуть до</th><th>Возврат</th><th>Примечание</th><th>Действия</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h2>Оформить выдачу</h2>
    <label>Инструмент *</label>
    <select id="f-instr"></select>
    <label>Сотрудник *</label>
    <select id="f-empl"></select>
    <label>Дата выдачи *</label>
    <input type="date" id="f-date">
    <label>Вернуть до</label>
    <input type="date" id="f-rdate">
    <label>Примечание</label>
    <input type="text" id="f-note" placeholder="Для работ на объекте №3">
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="save()">Выдать</button>
    </div>
  </div>
</div>

<script>
async function load() {
  const data = await fetch('/api/issues').then(r=>r.json());
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  (data||[]).forEach(iss => {
    const returned = iss.return_date;
    tbody.innerHTML += `<tr class="${returned?'row-returned':''}">
      <td>${iss.id}</td>
      <td><strong>${iss.instrument_name}</strong></td>
      <td>${iss.employee_name}</td>
      <td>${iss.issue_date}</td>
      <td>${iss.expected_return_date||'—'}</td>
      <td>${returned
        ? `<span class="badge badge-green">Возвращён ${returned}</span>`
        : '<span class="badge badge-coral">Не возвращён</span>'}</td>
      <td>${iss.note||'—'}</td>
      <td>
        ${!returned ? `<button class="btn btn-sm btn-teal" onclick="returnIss(${iss.id})">Вернуть</button>` : ''}
        <button class="btn btn-sm btn-danger" onclick="del(${iss.id})">Удалить</button>
      </td>
    </tr>`;
  });
}

async function openModal(){
  document.getElementById('modal').classList.remove('hidden');
  // Загружаем списки
  const [instrs, empls] = await Promise.all([
    fetch('/api/instruments').then(r=>r.json()),
    fetch('/api/employees').then(r=>r.json()),
  ]);
  const si = document.getElementById('f-instr');
  const se = document.getElementById('f-empl');
  si.innerHTML = (instrs||[])
    .filter(i=>i.status==='in_stock')
    .map(i=>`<option value="${i.id}">${i.name} (${i.inventory_number})</option>`).join('');
  se.innerHTML = (empls||[]).map(e=>`<option value="${e.id}">${e.full_name}</option>`).join('');
  // Дата сегодня по умолчанию
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
}

function closeModal(){ document.getElementById('modal').classList.add('hidden'); }

async function save(){
  const body = {
    instrument_id: parseInt(document.getElementById('f-instr').value),
    employee_id:   parseInt(document.getElementById('f-empl').value),
    issue_date:    document.getElementById('f-date').value,
    expected_return_date: document.getElementById('f-rdate').value,
    note:          document.getElementById('f-note').value,
  };
  const res = await fetch('/api/issues',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){ closeModal(); load(); } else alert('Ошибка оформления выдачи');
}

async function returnIss(id){
  if(!confirm('Оформить возврат инструмента?')) return;
  const res = await fetch(`/api/issues/${id}/return`,{method:'PUT'});
  if(res.ok) load(); else alert('Ошибка оформления возврата');
}

async function del(id){
  if(!confirm('Удалить запись о выдаче?')) return;
  const res = await fetch(`/api/issues/${id}`,{method:'DELETE'});
  if(res.ok) load(); else alert('Ошибка удаления');
}

load();
</script>
</body>
</html>
