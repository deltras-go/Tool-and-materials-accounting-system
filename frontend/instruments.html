<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Инструменты</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
  <div class="nav-brand">Учёт инструментов</div>
  <div class="nav-links">
    <a href="/">Главная</a>
    <a href="/instruments" class="active">Инструменты</a>
    <a href="/employees">Сотрудники</a>
    <a href="/issues">Выдачи</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Инструменты</h1>
    <button class="btn btn-primary" onclick="openModal()">+ Добавить</button>
  </div>

  <table id="table">
    <thead>
      <tr>
        <th>ID</th><th>Наименование</th><th>Инв. номер</th>
        <th>Категория</th><th>Статус</th><th>Описание</th><th>Действия</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<!-- Модальное окно -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h2 id="modal-title">Добавить инструмент</h2>
    <input type="hidden" id="f-id">
    <label>Наименование *</label>
    <input type="text" id="f-name" placeholder="Дрель ударная Bosch">
    <label>Инвентарный номер *</label>
    <input type="text" id="f-inv" placeholder="INV-001">
    <label>Категория *</label>
    <input type="text" id="f-cat" placeholder="Электроинструмент">
    <label>Статус</label>
    <select id="f-status">
      <option value="in_stock">На складе</option>
      <option value="issued">Выдан</option>
      <option value="repair">В ремонте</option>
      <option value="written_off">Списан</option>
    </select>
    <label>Описание</label>
    <input type="text" id="f-desc" placeholder="Дополнительная информация">
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="save()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const statusLabel = {
  in_stock:'На складе', issued:'Выдан', repair:'В ремонте', written_off:'Списан'
};
const statusClass = {
  in_stock:'badge-green', issued:'badge-coral', repair:'badge-amber', written_off:'badge-gray'
};

async function load() {
  const data = await fetch('/api/instruments').then(r=>r.json());
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  (data||[]).forEach(i => {
    tbody.innerHTML += `<tr>
      <td>${i.id}</td>
      <td><strong>${i.name}</strong></td>
      <td>${i.inventory_number}</td>
      <td>${i.category}</td>
      <td><span class="badge ${statusClass[i.status]||''}">${statusLabel[i.status]||i.status}</span></td>
      <td>${i.description||'—'}</td>
      <td>
        <button class="btn btn-sm" onclick='edit(${JSON.stringify(i)})'>Изменить</button>
        <button class="btn btn-sm btn-danger" onclick="del(${i.id})">Удалить</button>
      </td>
    </tr>`;
  });
}

function openModal(){ document.getElementById('modal').classList.remove('hidden'); clearForm(); }
function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
function clearForm(){
  ['f-id','f-name','f-inv','f-cat','f-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='in_stock';
  document.getElementById('modal-title').textContent='Добавить инструмент';
}

function edit(i){
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-title').textContent='Изменить инструмент';
  document.getElementById('f-id').value=i.id;
  document.getElementById('f-name').value=i.name;
  document.getElementById('f-inv').value=i.inventory_number;
  document.getElementById('f-cat').value=i.category;
  document.getElementById('f-status').value=i.status;
  document.getElementById('f-desc').value=i.description||'';
}

async function save(){
  const id = document.getElementById('f-id').value;
  const body = {
    name: document.getElementById('f-name').value,
    inventory_number: document.getElementById('f-inv').value,
    category: document.getElementById('f-cat').value,
    status: document.getElementById('f-status').value,
    description: document.getElementById('f-desc').value,
  };
  const url = id ? `/api/instruments/${id}` : '/api/instruments';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){ closeModal(); load(); } else alert('Ошибка сохранения');
}

async function del(id){
  if(!confirm('Удалить инструмент?')) return;
  const res = await fetch(`/api/instruments/${id}`,{method:'DELETE'});
  if(res.ok) load(); else alert('Ошибка удаления');
}

load();
</script>
</body>
</html>
