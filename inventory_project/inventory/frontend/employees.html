<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сотрудники</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
  <div class="nav-brand">Учёт инструментов</div>
  <div class="nav-links">
    <a href="/">Главная</a>
    <a href="/instruments">Инструменты</a>
    <a href="/employees" class="active">Сотрудники</a>
    <a href="/issues">Выдачи</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Сотрудники</h1>
    <button class="btn btn-primary" onclick="openModal()">+ Добавить</button>
  </div>

  <table>
    <thead>
      <tr><th>ID</th><th>ФИО</th><th>Должность</th><th>Подразделение</th><th>Действия</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h2 id="modal-title">Добавить сотрудника</h2>
    <input type="hidden" id="f-id">
    <label>ФИО *</label>
    <input type="text" id="f-name" placeholder="Иванов Иван Иванович">
    <label>Должность *</label>
    <input type="text" id="f-pos" placeholder="Слесарь">
    <label>Подразделение *</label>
    <input type="text" id="f-dep" placeholder="Производственный цех">
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="save()">Сохранить</button>
    </div>
  </div>
</div>

<script>
async function load() {
  const data = await fetch('/api/employees').then(r=>r.json());
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  (data||[]).forEach(e => {
    tbody.innerHTML += `<tr>
      <td>${e.id}</td>
      <td><strong>${e.full_name}</strong></td>
      <td>${e.position}</td>
      <td>${e.department}</td>
      <td>
        <button class="btn btn-sm" onclick='edit(${JSON.stringify(e)})'>Изменить</button>
        <button class="btn btn-sm btn-danger" onclick="del(${e.id})">Удалить</button>
      </td>
    </tr>`;
  });
}

function openModal(){ document.getElementById('modal').classList.remove('hidden'); clearForm(); }
function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
function clearForm(){
  ['f-id','f-name','f-pos','f-dep'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-title').textContent='Добавить сотрудника';
}

function edit(e){
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-title').textContent='Изменить сотрудника';
  document.getElementById('f-id').value=e.id;
  document.getElementById('f-name').value=e.full_name;
  document.getElementById('f-pos').value=e.position;
  document.getElementById('f-dep').value=e.department;
}

async function save(){
  const id = document.getElementById('f-id').value;
  const body = {
    full_name: document.getElementById('f-name').value,
    position:  document.getElementById('f-pos').value,
    department:document.getElementById('f-dep').value,
  };
  const url = id ? `/api/employees/${id}` : '/api/employees';
  const method = id ? 'PUT' : 'POST';
  const res = await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.ok){ closeModal(); load(); } else alert('Ошибка сохранения');
}

async function del(id){
  if(!confirm('Удалить сотрудника?')) return;
  const res = await fetch(`/api/employees/${id}`,{method:'DELETE'});
  if(res.ok) load(); else alert('Ошибка удаления');
}

load();
</script>
</body>
</html>
